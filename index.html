<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XinnStore Premium</title>
<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.header{display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid #222}
.logo{height:40px}
.container{padding:20px}
.card{background:#111a2e;padding:20px;border-radius:16px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.btn{background:#3b82f6;padding:10px;border-radius:10px;color:#fff;cursor:pointer;text-align:center}
</style>
</head>
<body>

<div class="header">
<img src="assets/logo.svg" class="logo"/>
<h2>XinnStore Premium</h2>
</div>

<div class="container">
<h3>Produk</h3>
<div class="grid">
<div class="card"><img src="assets/icon1.svg"><p>Mobile Legends</p><div class="btn">Top Up</div></div>
<div class="card"><img src="assets/icon2.svg"><p>Free Fire</p><div class="btn">Top Up</div></div>
<div class="card"><img src="assets/icon3.svg"><p>PUBG</p><div class="btn">Top Up</div></div>
</div>
</div>

</body>
</html>
